<!DOCTYPE html>
<html>
<head>
    <title>Mall Navigation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">
        🚶 Find Route
    </h1>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Current Location
            </label>

            <select
                name="start"
                class="form-select"
            >

                {% for place in locations %}

                    <option value="{{ place }}">
                        {{ place }}
                    </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Destination
            </label>

            <select
                name="destination"
                class="form-select"
            >

                {% for place in locations %}

                    <option value="{{ place }}">
                        {{ place }}
                    </option>

                {% endfor %}

            </select>

        </div>

        <button
            type="submit"
            class="btn btn-primary"
        >
            Find Route
        </button>

    </form>

    {% if path_result %}

        <div class="card mt-4">

            <div class="card-header">
                Shortest Route
            </div>

            <div class="card-body">

                {% for step in path_result %}

                    <p>
                        ➜ {{ step }}
                    </p>

                {% endfor %}

            </div>

        </div>

    {% endif %}

</div>

</body>
</html>
